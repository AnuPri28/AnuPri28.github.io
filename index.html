    <style>

        * {
            margin: 0;
            padding: 0;

        /* Navigation */

        nav {

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 20px 8%;

            background: rgba(15, 23, 42, 0.8);

            backdrop-filter: blur(10px);

        nav h2 {

            color: #93c5fd;

        }

        nav a {

            margin-left: 25px;

            font-size: 16px;

        }

            color: #93c5fd;

        }

        /* Hero Section */

        .hero {

            text-align: center;

            padding: 100px 20px;

        }

        .hero h1 {

            font-size: 52px;

            margin-bottom: 25px;

            background:

                linear-gradient(
                    90deg,
                    #60a5fa,
                    #c084fc
                );

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

        }

        .hero p {

            font-size: 20px;

            color: #cbd5e1;

            max-width: 750px;

            margin: auto;

            line-height: 1.7;

        }

        /* Main Content */

        main {

            max-width: 1100px;

            margin: auto;

            padding: 40px 20px;

        }

        main h2 {

            text-align: center;

            margin-bottom: 35px;

            font-size: 32px;

        }

        /* Article Cards */

        .articles {

            display: grid;

            grid-template-columns:

                repeat(
                    auto-fit,
                    minmax(280px, 1fr)
                );

            gap: 25px;

        }

        .article {

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 15px;

            padding: 30px;

            backdrop-filter: blur(10px);

            transition: 0.3s;

        }

        .article:hover {

            transform: translateY(-8px);

            background: rgba(255, 255, 255, 0.14);

        }

        .article h3 {

            color: #93c5fd;

            margin-bottom: 15px;

        }

        .article p {

            color: #cbd5e1;

            line-height: 1.6;

            margin-bottom: 20px;

        }

        .article a {

            color: #c084fc;

            text-decoration: none;

            font-weight: bold;

        }

        /* Footer */

        footer {

            text-align: center;

            padding: 40px;

            margin-top: 60px;

            color: #94a3b8;

        }

    </style>

</head>
